title: Hart's Notebook
subtitle: Software, systems, and useful tools.
description: A small personal site for occasional notes, photos, and resume links.
url: "https://hartr.github.io"
baseurl: ""
lang: en

author:
  name: Hart
  github: HartR

permalink: /blog/:year/:month/:day/:title/

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - resume.tex
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
