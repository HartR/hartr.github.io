---
layout: default
---
<article class="page-card">
  <header class="page-header">
    <p class="eyebrow">{{ page.eyebrow | default: 'Notebook' }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
